name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-node@v4
        with:
          node-size: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run CI Build and Verify
        run: npm run build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Memory and Reasoning Tests
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm test