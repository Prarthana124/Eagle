name: CI Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configure Memory Mitigation Flags
      run: |
        # Turn off pip's internal cache buffering to prevent 137 RAM crash spikes
        echo "PIP_NO_CACHE_DIR=1" >> $GITHUB_ENV
        echo "PIP_DEFAULT_TIMEOUT=100" >> $GITHUB_ENV
        
        # Limit the number of concurrent processes so parallel builds don't exceed the 7GB runner ceiling
        echo "POETRY_CORE_MAX_WORKERS=2" >> $GITHUB_ENV

    - name: Install Project Dependencies Safely
      run: |
        python -m pip install --upgrade pip
        # Install the dependencies from pyproject.toml without creating multi-environment RAM overhead
        pip install . --no-build-isolation