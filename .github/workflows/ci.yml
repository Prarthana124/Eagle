name: CI Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Fix 4: Set up 4GB Swap Space to prevent system ENOMEM (Exit Code 137) crashes
    - name: Add Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 4

    # Fix 3: Set up Node with caching optimized
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # Fix 2: Clean install dependencies using npm ci (much lighter on memory than npm install)
    - name: Install Dependencies
      run: npm ci

    # Fix 1 & 5: Increase Heap Size limit to 4GB and run lint/build as separate isolated steps
    - name: Run Linter
      run: npm run lint
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"

    - name: Run Build
      run: npm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"